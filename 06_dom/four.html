<script>

    //     appendChild(li)

    // }
    // addLang('python')

    //optimal method
    function addOptLang(langName){
          const li=document.createElement('li');
          //const addText=document.createTextNode(langName) //to save one variable
          li.appendChild(document.createTextNode(langName))
          document.querySelector(".lang").
          appendChild(li)

    }
    addOptLang('python')
    addOptLang('cpp')
    addOptLang('php')

    //Edit val
    let secondLang=document.querySelector("li:nth-child(2)")
    //secondLang.innerHTML="Mojo"
   const newLi= document.createElement('li')
   newLi.textContent="mojo"
   secondLang.replaceWith(newLi)


   //edit 1
   let firstLang=document.querySelector("li:first-child")
   firstLang.outerHTML='<li>MongoDB</li>'

   //remove
   const lastLang=document.querySelector('li:last-child')
   lastLang.remove()
</script>
